<script>function addRow(){var list=document.getElementById('itemsList');var row=document.createElement('div');row.className='items-row';row.innerHTML='<input type="number" class="qty-inp" value="1" min="1" onchange="calc()">'+'<input type="text" class="desc-inp" placeholder="اسم المنتج">'+'<input type="number" class="price-inp" value="0" step="0.01" onchange="calc()">'+'<div class="line-total">0.00</div>'+'<button class="btn btn-remove" onclick="removeRow(this)">×</button>';list.appendChild(row);calc()}function removeRow(btn){var rows=document.querySelectorAll('#itemsList .items-row');if(rows.length>1){btn.closest('.items-row').remove();calc()}else{alert('لا يمكن حذف آخر بند!')}}function calc(){var rows=document.querySelectorAll('#itemsList .items-row');var totalHT=0;for(var i=0;i<rows.length;i++){var q=parseFloat(rows[i].querySelector('.qty-inp').value)||0;var p=parseFloat(rows[i].querySelector('.price-inp').value)||0;var l=q*p;rows[i].querySelector('.line-total').textContent=l.toFixed(2);totalHT+=l}var v=parseFloat(document.getElementById('tvaRate').value)||0;var tv=totalHT*(v/100);document.getElementById('summaryBox').textContent='HT: '+totalHT.toFixed(2)+' | TVA ('+v+'%): '+tv.toFixed(2)+' | TTC: '+(totalHT+tv).toFixed(2);return{totalHT:totalHT,tva:tv,ttc:totalHT+tv,rate:v}}function generate(){var totals=calc();document.getElementById('previewTopIds').innerHTML='<span>RC: '+document.getElementById('sellerRC').value+'</span> | '+'<span>ICE : '+document.getElementById('sellerICE').value+'</span> | '+'<span>PATENTE : '+document.getElementById('sellerPatente').value+'</span> | '+'<span>IF : '+document.getElementById('sellerIF').value+'</span> | '+'<span>CNSS : '+document.getElementById('sellerCNSS').value+'</span> | '+'<span>RIB : '+document.getElementById('sellerRIB').value+'</span>';document.getElementById('previewLogoText').textContent=document.getElementById('logoText').value;document.getElementById('previewLogoSub').textContent=document.getElementById('logoSub').value;document.getElementById('previewCompanyName').textContent=document.getElementById('sellerName').value;document.getElementById('previewCompanyBank').textContent=document.getElementById('sellerBank').value;var d=document.getElementById('invoiceDate').value;var place=document.getElementById('invoicePlace').value;var fd=d?new Date(d).toLocaleDateString('fr-FR'):'';document.getElementById('previewDatePlace').textContent='A '+place+' Le '+fd;document.getElementById('previewInvoiceNum').textContent='FACTURE N° : '+document.getElementById('invoiceNum').value;document.getElementById('previewBuyerName').textContent=document.getElementById('buyerName').value;var ice=document.getElementById('buyerIce').value;document.getElementById('previewBuyerIce').textContent=ice?'ICE: '+ice:'';var pb=document.getElementById('previewItemsBody');pb.innerHTML='';var rows=document.querySelectorAll('#itemsList .items-row');for(var i=0;i<rows.length;i++){var q=rows[i].querySelector('.qty-inp').value;var desc=rows[i].querySelector('.desc-inp').value;var p=rows[i].querySelector('.price-inp').value;var l=rows[i].querySelector('.line-total').textContent;var div=document.createElement('div');div.className='item-row';div.innerHTML='<div class="col-q">'+q+'</div>'+'<div class="col-d">'+desc+'</div>'+'<div class="col-p">'+parseFloat(p).toFixed(2)+'</div>'+'<div class="col-t">'+l+'</div>';pb.appendChild(div)}document.getElementById('previewTotalHT').textContent=totals.totalHT.toFixed(2);document.getElementById('previewTvaRate').textContent=totals.rate;document.getElementById('previewTVA').textContent=totals.tva.toFixed(2);document.getElementById('previewTotalTTC').textContent=totals.ttc.toFixed(2);document.getElementById('previewFooterAddress').innerHTML=document.getElementById('sellerAddress').value.replace(/, /g,'<br>');document.getElementById('previewFooterPhone').textContent=document.getElementById('sellerPhone').value;document.getElementById('previewFooterEmail').textContent=document.getElementById('sellerEmail').value;document.getElementById('invoicePreview').classList.remove('hidden');document.getElementById('printBtn').classList.remove('hidden');document.getElementById('invoicePreview').scrollIntoView({behavior:'smooth'})}calc()</script></body></html>
